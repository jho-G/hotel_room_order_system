services:
  - type: web
    name: hotel-room-ordering
    env: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://hotel-room-ordering.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString
      - key: SITE_URL
        value: https://hotel-room-ordering.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.10"
    disk:
      name: media-files
      mountPath: /opt/render/project/src/media
      sizeGB: 1

databases:
  - name: hotel-db
    plan: free
